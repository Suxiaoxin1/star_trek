[pytest]
# pytest-asyncio 配置
# auto 模式：自动识别 async 测试函数，无需 @pytest.mark.asyncio 装饰器
asyncio_mode = auto
# 所有 async fixture 共享同一个 session 级别的事件循环
# 解决嵌套 async fixture（如 analyst_token 依赖 client）的 "Runner.run() cannot be called from a running event loop" 错误
# 以及 session 级 fixture（setup_database）与 function 级 fixture 的 scope 冲突
asyncio_default_fixture_loop_scope = session
# 测试文件匹配模式
python_files = test_*.py
python_classes = Test*
python_functions = test_*
# 过滤警告
filterwarnings =
    ignore::DeprecationWarning
    ignore::pytest.PytestUnraisableExceptionWarning
